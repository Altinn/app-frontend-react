name: Tests
on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'yarn.lock'
      - '.github/workflows/unit-tests.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'yarn.lock'
      - '.github/workflows/unit-tests.yml'

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    name: Type-checks, eslint, unit tests and SonarCloud
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: app-frontend
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: install node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'

      - name: Get yarn cache directory path
        working-directory: app-frontend
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        id: yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: install dependencies
        working-directory: app-frontend
        run: yarn --immutable

      - name: type-check
        working-directory: app-frontend
        run: yarn tsc

      - name: run eslint
        working-directory: app-frontend
        run: yarn lint

      - name: run tests
        working-directory: app-frontend
        run: yarn test --coverage

      - name: SonarCloud Scan
        if: |
          github.repository_owner == 'Altinn' &&
          (github.event_name != 'pull_request' && github.event.repository.fork == false) ||
          (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)
        with:
          projectBaseDir: app-frontend
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
